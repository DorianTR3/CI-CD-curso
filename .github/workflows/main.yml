name: Mi primer github action

on:
push:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout del codigo
    uses: actions/checkout@v4

  - name: Usar Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Construir app con node
    run: npm install
